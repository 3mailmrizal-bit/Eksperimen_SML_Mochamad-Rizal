name: CI-MLflow-Workflow-Advance

on:
  push:
    branches: [ main ]

jobs:
  train-and-artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install mlflow==2.11.0 pandas scikit-learn docker

      - name: Run MLflow Project
        run: |
          # Perbaikan path: Masuk ke folder Workflow-CI/MLProject
          cd Workflow-CI/MLProject
          mlflow run . --experiment-name "Workflow_CI_Experiment" --env-manager local

      - name: Upload Model Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: Workflow-CI/MLProject/mlruns/

  build-and-push:
    needs: train-and-artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          # Perbaikan path: Masuk ke folder Workflow-CI/MLProject
          cd Workflow-CI/MLProject
          mlflow models build-docker -m runs:/$(ls mlruns/0 | head -n 1)/ci_model -n ${{ secrets.DOCKER_USERNAME }}/msml-model:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/msml-model:latest
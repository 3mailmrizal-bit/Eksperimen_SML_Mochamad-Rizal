name: CI-MLflow-Workflow

on:
  push:
    branches: [ main ]

jobs:
  train-model:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install mlflow pandas scikit-learn

      - name: Run MLflow Project
        # Jalankan dari root, mengarah ke folder sub-project
        run: mlflow run Workflow-CI/MLProject --experiment-name "Workflow_CI_Experiment" --env-manager local

      - name: Upload Model Artifact
        uses: actions/upload-artifact@v4  # PENTING: Gunakan v4, bukan v3
        with:
          name: model-hasil-training
          path: mlruns/  # Folder tempat MLflow menyimpan hasil secara otomatis
name: CI-MLflow-Workflow-Docker

on:
  push:
    branches: [ main ]

jobs:
  train-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Install dependencies
        run: pip install mlflow pandas scikit-learn docker

      - name: Run MLflow Project (Training)
        run: |
          mlflow run Workflow-CI/MLProject --experiment-name "Workflow_CI_Experiment" --env-manager local

      - name: Upload Model Artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: model-hasil-training
          path: mlruns/

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Debug - Check Model Path
        run: |
          echo "=== Checking mlruns structure ==="
          find mlruns -type d | head -20
          
          echo -e "\n=== Looking for artifacts folder ==="
          find mlruns -type d -name "artifacts"
          
          echo -e "\n=== Checking ci_model folder ==="
          find mlruns -type d -name "ci_model"
          
          echo -e "\n=== Latest run folder ==="
          LATEST_RUN=$(find mlruns -type d -name "[0-9a-f]*" -path "*/mlruns/*" | sort -r | head -n 1)
          echo "Latest run: $LATEST_RUN"
          ls -la $LATEST_RUN/artifacts/ || echo "No artifacts folder found"
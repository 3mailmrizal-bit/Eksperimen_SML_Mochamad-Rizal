name: CI-MLflow-Workflow-Docker

on:
  push:
    branches: [ main ]

jobs:
  train-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Install dependencies
        run: pip install mlflow pandas scikit-learn docker

      - name: Run MLflow Project (Training)
        run: |
          mlflow run Workflow-CI/MLProject --experiment-name "Workflow_CI_Experiment" --env-manager local

      - name: Upload Model Artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: model-hasil-training
          path: mlruns/

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build Docker Image
        run: |
          cd Workflow-CI/MLProject
          
          # 1. Cari lokasi folder yang berisi file 'MLmodel' di dalam mlruns
          # Ini adalah cara paling akurat menemukan lokasi model
          MODEL_PATH=$(find mlruns -name "MLmodel" -exec dirname {} \;)
          
          echo "Model path ditemukan di: $MODEL_PATH"
          
          # 2. Pastikan path ditemukan
          if [ -z "$MODEL_PATH" ]; then
            echo "Error: Model tidak ditemukan!"
            exit 1
          fi

          # 3. Build menggunakan path yang ditemukan (tanpa perlu format runs:/)
          # Kita gunakan -m dengan path lokal tersebut
          mlflow models build-docker -m "$MODEL_PATH" -n "${{ secrets.DOCKER_USER }}/msml-model:latest"

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USER }}/msml-model:latest
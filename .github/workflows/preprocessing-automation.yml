name: Automated Data Preprocessing Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'CSS_raw.csv'
      - 'preprocessing/automate_Mochamad-Rizal.py'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12.7
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.7'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas scikit-learn

    - name: Run Preprocessing Script
      run: |
        python preprocessing/automate_Mochamad-Rizal.py

    - name: Upload Clean Dataset Artifact
      uses: actions/artifacts@v4
      with:
        name: css-clean-dataset
        path: preprocessing/CSS_preprocessing.csv
        retention-days: 7